<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate BMI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            /* Background Image Setup */
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            
            /* 20% dark shadow, leaving the image at exactly 80% brightness */
            background-color: rgba(0, 0, 0, 0.2); 
            background-blend-mode: overlay; 
        }
        .gauge-container { position: relative; width: 200px; height: 100px; overflow: hidden; }
        .gauge-track { width: 200px; height: 200px; border-radius: 50%; border: 20px solid #e2e8f0; box-sizing: border-box; }
        .gauge-needle {
            position: absolute; bottom: 0; left: 50%; width: 6px; height: 80px; 
            background: #ef4444; border-radius: 3px; transform-origin: bottom center; 
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
        <h1 class="text-3xl font-extrabold text-center mb-6 text-emerald-400">📊 BMI Fitness Dashboard</h1>

        <form id="bmiForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Full Name</label>
                    <input type="text" id="name" placeholder="e.g. Chitwan" required class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Age</label>
                    <input type="number" id="age" placeholder="e.g. 21" required class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-1">Weight</label>
                <div class="flex space-x-2">
                    <input type="number" step="0.1" id="weight" placeholder="e.g. 65" required class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white outline-none focus:ring-2 focus:ring-emerald-500">
                    <select id="weightUnit" class="bg-slate-700 rounded-lg px-2 py-2 text-white cursor-pointer outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="kg">kg</option>
                        <option value="lbs">lbs</option>
                    </select>
                </div>
            </div>
        
            <div>
                <label class="block text-sm font-semibold mb-1">Height</label>
                <div class="flex space-x-2">
                    <input type="number" step="0.01" id="height_standard" placeholder="e.g. 175" class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white outline-none focus:ring-2 focus:ring-emerald-500 block">
                    <input type="number" id="height_ft" placeholder="e.g. 5 (ft)" class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white outline-none focus:ring-2 focus:ring-emerald-500 hidden">
                    <input type="number" id="height_in" placeholder="e.g. 8 (in)" class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white outline-none focus:ring-2 focus:ring-emerald-500 hidden">
                    
                    <select id="heightUnit" onchange="toggleHeightUI()" class="bg-slate-700 rounded-lg px-2 py-2 text-white cursor-pointer outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="cm">cm</option>
                        <option value="m">m</option>
                        <option value="inch">in</option>
                        <option value="ft">ft / in</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Region</label>
                <select id="location" class="w-full bg-slate-700 rounded-lg px-4 py-2 text-white cursor-pointer outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    <optgroup label="Asia">
                        <option value="South Asia">South Asia (India, Pakistan, etc.)</option>
                        <option value="East Asia">East Asia (China, Japan, Korea)</option>
                        <option value="Southeast Asia">Southeast Asia</option>
                        <option value="Middle East">Middle East</option>
                    </optgroup>
                    <optgroup label="Americas">
                        <option value="North America">North America</option>
                        <option value="Central America">Central America</option>
                        <option value="South America">South America</option>
                    </optgroup>
                    <optgroup label="Europe">
                        <option value="Western Europe">Western Europe</option>
                        <option value="Eastern Europe">Eastern Europe</option>
                        <option value="Northern Europe">Northern Europe</option>
                        <option value="Southern Europe">Southern Europe</option>
                    </optgroup>
                    <optgroup label="Africa & Oceania">
                        <option value="North Africa">North Africa</option>
                        <option value="Sub-Saharan Africa">Sub-Saharan Africa</option>
                        <option value="Oceania">Oceania</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-semibold mb-1">Activity Level</label>
                    <select id="activity_level" class="w-full bg-slate-700 rounded-lg px-2 py-2 text-white cursor-pointer outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                        <option value="Sedentary">Sedentary (Sitting work)</option>
                        <option value="Lightly Active">Lightly Active (1-3 days)</option>
                        <option value="Moderately Active">Moderately Active (3-5 days)</option>
                        <option value="Very Active">Very Active (Heavy exercise)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Dietary Preference</label>
                    <select id="dietary_preference" class="w-full bg-slate-700 rounded-lg px-2 py-2 text-white cursor-pointer outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                        <option value="Omnivore">Omnivore (Meat & Plants)</option>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="Vegan">Vegan</option>
                        <option value="Pescatarian">Pescatarian (Fish & Veggies)</option>
                        <option value="Keto">Keto (Low-Carb)</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center space-x-2 pt-2">
                <input type="checkbox" id="consent" checked class="w-4 h-4 text-emerald-500 bg-slate-700 border-slate-600 rounded focus:ring-emerald-500 focus:ring-2 cursor-pointer">
                <label for="consent" class="text-sm font-semibold text-slate-300 cursor-pointer">I consent to save my real name (Uncheck to stay anonymous)</label>
            </div>
            
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-lg mt-2 cursor-pointer transition duration-200 shadow-lg">
                Calculate Score
            </button>

            <div class="mt-6 bg-slate-900/60 border border-slate-700 rounded-xl p-5 text-center shadow-inner">
                <p class="text-emerald-400 font-bold text-sm mb-1 uppercase tracking-wider">💡 Clinical Formula</p>
                <p class="text-slate-300 font-mono text-base bg-slate-800 inline-block px-4 py-1 rounded-md mt-2 border border-slate-600">
                    BMI = Weight (kg) / Height (m)<sup>2</sup>
                </p>
            </div>
        </form>

        <div id="results" class="hidden border-t border-slate-700 pt-6">
            <h2 id="greeting" class="text-xl font-bold text-center"></h2>
            
            <div class="flex flex-col items-center justify-center mt-4">
                <div class="gauge-container">
                    <div class="gauge-track"></div>
                    <div id="needle" class="gauge-needle"></div>
                </div>
                <div id="bmiDisplay" class="text-5xl font-black mt-4 text-emerald-400">0.0</div>
                <div id="categoryDisplay" class="text-lg font-bold px-4 py-1 rounded-full mt-2">Normal</div>
            </div>

            <div class="bg-slate-700/50 p-5 rounded-xl mt-6 border border-slate-600">
                <h3 class="text-md font-bold text-emerald-400 mb-2">🍎 Recommended Diet Strategy:</h3>
                <p id="dietPlan" class="text-sm text-slate-300 leading-relaxed"></p>
            </div>
        </div>

        <button id="resetBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg mt-6 hidden transition duration-200 cursor-pointer border border-slate-600">
            Calculate Another BMI
        </button>

    </div>

    <script>
        function toggleHeightUI() {
            const unit = document.getElementById('heightUnit').value;
            const singleDiv = document.getElementById('height_standard');
            const ftDiv = document.getElementById('height_ft');
            const inDiv = document.getElementById('height_in');

            if (unit === 'ft') {
                singleDiv.classList.remove('block');
                singleDiv.classList.add('hidden');
                ftDiv.classList.remove('hidden');
                ftDiv.classList.add('block');
                inDiv.classList.remove('hidden');
                inDiv.classList.add('block');
            } else {
                ftDiv.classList.remove('block');
                ftDiv.classList.add('hidden');
                inDiv.classList.remove('block');
                inDiv.classList.add('hidden');
                singleDiv.classList.remove('hidden');
                singleDiv.classList.add('block');
            }
        }

        function showDashboard(data) {
            document.getElementById('greeting').innerText = `Hello ${data.name}! Here is your analysis:`;
            document.getElementById('bmiDisplay').innerText = data.calculated_bmi;
            document.getElementById('categoryDisplay').innerText = data.category;
            
            document.getElementById('dietPlan').innerText = data.diet_plan || "Check back soon for diet tips!";

            const catDiv = document.getElementById('categoryDisplay');
            catDiv.className = "text-sm font-bold px-4 py-1 rounded-full mt-2 ";
            if(data.category === "Underweight") catDiv.classList.add('bg-blue-500/20', 'text-blue-400');
            else if(data.category === "Normal Weight" || data.category === "Normal") catDiv.classList.add('bg-emerald-500/20', 'text-emerald-400');
            else if(data.category === "Overweight") catDiv.classList.add('bg-amber-500/20', 'text-amber-400');
            else catDiv.classList.add('bg-red-500/20', 'text-red-400');

            let bmi = data.calculated_bmi;
            if (bmi < 15) bmi = 15;
            if (bmi > 40) bmi = 40;
            const percentage = (bmi - 15) / (40 - 15);
            const degrees = -90 + (percentage * 180);
            
            setTimeout(() => {
                document.getElementById('needle').style.transform = `translateX(-50%) rotate(${degrees}deg)`;
            }, 100);

            document.getElementById('bmiForm').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('resetBtn').classList.remove('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedData = localStorage.getItem('userBMI');
            if (savedData) {
                try {
                    const parsedData = JSON.parse(savedData);
                    if (!parsedData.diet_plan) throw new Error("Old data version detected.");
                    showDashboard(parsedData);
                } catch (error) {
                    console.log("Cleared old cache memory to prevent a crash.");
                    localStorage.removeItem('userBMI');
                }
            }
        });

        document.getElementById('bmiForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            let finalHeight = 0;
            let finalUnit = document.getElementById('heightUnit').value;
            
            if (finalUnit === 'ft') {
                const ftVal = parseFloat(document.getElementById('height_ft').value) || 0;
                const inVal = parseFloat(document.getElementById('height_in').value) || 0;
                finalHeight = ftVal + (inVal / 12);
            } else if (finalUnit === 'inch') {
                finalHeight = (parseFloat(document.getElementById('height_standard').value) || 0) / 12;
                finalUnit = 'ft';
            } else {
                finalHeight = parseFloat(document.getElementById('height_standard').value) || 0;
            }
            
            const payload = {
                name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                weight_kg: parseFloat(document.getElementById('weight').value),
                weight_unit: document.getElementById('weightUnit').value,
                height_meters: finalHeight,
                height_unit: finalUnit,
                location: document.getElementById('location').value,
                activity_level: document.getElementById('activity_level').value,
                dietary_preference: document.getElementById('dietary_preference').value,
                consent: document.getElementById('consent').checked
            };

            const response = await fetch('/calculate_bmi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(response.ok){
                const data = await response.json();
                localStorage.setItem('userBMI', JSON.stringify(data));
                showDashboard(data);
            } else {
                alert('Oops! Check your numbers and make sure everything is filled out.');
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            localStorage.removeItem('userBMI');
            document.getElementById('bmiForm').reset();
            toggleHeightUI(); 
            document.getElementById('needle').style.transform = `translateX(-50%) rotate(-90deg)`;
            
            document.getElementById('results').classList.add('hidden');
            document.getElementById('resetBtn').classList.add('hidden');
            document.getElementById('bmiForm').classList.remove('hidden');
        });
    </script>
</body>
</html>
